<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CMS Authentication</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <!-- Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1c1b1b",
                        "inverse-on-surface": "#372f26",
                        "on-tertiary": "#313030",
                        "surface-container-high": "#302920",
                        "on-background": "#eee0d2",
                        "primary": "#ffc880",
                        "on-secondary-container": "#b7b5af",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "on-secondary": "#31312c",
                        "tertiary-fixed": "#e5e2e1",
                        "surface-bright": "#40382e",
                        "on-tertiary-fixed-variant": "#474746",
                        "surface-tint": "#ffb955",
                        "surface-container": "#251e16",
                        "secondary": "#c9c6c0",
                        "tertiary-container": "#b8b6b5",
                        "primary-fixed-dim": "#ffb955",
                        "outline-variant": "#524534",
                        "surface-container-low": "#211a12",
                        "on-secondary-fixed": "#1c1c18",
                        "on-primary-container": "#644000",
                        "surface-dim": "#19120a",
                        "on-tertiary-container": "#484747",
                        "surface-container-highest": "#3c332a",
                        "secondary-container": "#474742",
                        "primary-fixed": "#ffddb4",
                        "inverse-primary": "#835500",
                        "background": "#19120a",
                        "surface-container-lowest": "#130d06",
                        "surface": "#19120a",
                        "on-primary-fixed": "#291800",
                        "inverse-surface": "#eee0d2",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#474742",
                        "on-primary": "#452b00",
                        "secondary-fixed-dim": "#c9c6c0",
                        "outline": "#9f8e7a",
                        "surface-variant": "#3c332a",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#d7c3ae",
                        "on-primary-fixed-variant": "#633f00",
                        "error": "#ffb4ab",
                        "primary-container": "#f5a623",
                        "on-surface": "#eee0d2",
                        "tertiary": "#d4d1d1",
                        "secondary-fixed": "#e5e2db",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "input-padding-y": "10px",
                        "input-padding-x": "14px",
                        "container-padding": "24px",
                        "margin": "32px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Syne"],
                        "headline-lg": ["Syne"],
                        "input": ["DM Sans"],
                        "button": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "body-md": ["DM Sans"],
                        "headline-md": ["Syne"],
                        "label-caps": ["DM Sans"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "input": ["14px", { "lineHeight": "1", "fontWeight": "400" }],
                        "button": ["14px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0A0A0A;
            background-image: radial-gradient(#F5A62308 1px, transparent 1px);
            background-size: 24px 24px;
            overflow: hidden;
        }

        .glow-background {
            background: radial-gradient(circle at center, #F5A62310 0%, transparent 70%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
        }

        .success-overlay {
            background: radial-gradient(circle at center, #22C55E08 0%, transparent 80%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .auth-card {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .input-focus-glow:focus-within {
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
        }

        .progress-bar-inner {
            width: 0%;
            transition: width 1800ms linear;
        }

        .state-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden-state {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            position: absolute;
        }

        .active-state {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            position: relative;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">
    <div class="glow-background"></div>
    <div class="success-overlay" id="successOverlay"></div>
    <main class="w-full max-w-[420px] px-spacing-gutter md:px-0">
        <div class="auth-card rounded-[16px] p-[40px]" id="authCard">
            <!-- State 1: Login Form -->
            <div class="active-state state-transition" id="loginState">
                <header class="mb-8">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-4 h-4 bg-primary-container"></div>
                        <span
                            class="font-headline-sm text-label-caps text-on-surface uppercase tracking-[0.08em]">CMS</span>
                    </div>
                    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant/60">Sign in to manage your content</p>
                </header>
                <form class="space-y-6" id="loginForm">
                    <div>
                        <label
                            class="block font-label-caps text-label-caps text-on-surface-variant/60 mb-2">USERNAME</label>
                        <div class="relative group input-focus-glow rounded-lg">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-[20px]">person</span>
                            <input
                                class="w-full bg-[#111111] border-[#2A2A2A] focus:border-primary-container text-on-surface rounded-lg py-input-padding-y pl-12 pr-input-padding-x font-input text-input transition-colors outline-none"
                                id="username" placeholder="Enter your username" required="" type="text" />
                        </div>
                    </div>
                    <div>
                        <label
                            class="block font-label-caps text-label-caps text-on-surface-variant/60 mb-2">PASSWORD</label>
                        <div class="relative group input-focus-glow rounded-lg">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-[20px]">lock</span>
                            <input
                                class="w-full bg-[#111111] border-[#2A2A2A] focus:border-primary-container text-on-surface rounded-lg py-input-padding-y pl-12 pr-12 font-input text-input transition-colors outline-none"
                                id="password" placeholder="••••••••" required="" type="password" />
                            <button
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-on-surface transition-colors"
                                onclick="togglePassword()" type="button">
                                <span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility</span>
                            </button>
                        </div>
                    </div>
                    <button
                        class="w-full bg-primary-container hover:bg-primary-container/90 active:scale-[0.98] text-on-primary-container font-button text-button h-[48px] rounded-lg flex items-center justify-center gap-2 transition-all group"
                        type="submit">
                        <span id="btnText">Sign In</span>
                        <span
                            class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform"
                            id="btnIcon">arrow_forward</span>
                        <div class="hidden" id="loadingSpinner">
                            <svg class="animate-spin h-5 w-5 text-on-primary-container" fill="none" viewbox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                                    fill="currentColor"></path>
                            </svg>
                        </div>
                    </button>
                </form>
                <footer class="mt-8 text-center">
                    <p class="font-label-caps text-[10px] text-on-surface-variant/40 uppercase tracking-[0.1em]">
                        Dashboard access is restricted.</p>
                </footer>
            </div>
            <!-- State 2: Failure -->
            <div class="hidden-state state-transition flex flex-col items-center text-center py-4" id="failureState">
                <div
                    class="w-[64px] h-[64px] rounded-full border-2 border-red-500/30 flex items-center justify-center mb-6">
                    <span class="material-symbols-outlined text-red-500 text-[32px]">cancel</span>
                </div>
                <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Access Denied</h2>
                <p class="font-body-md text-body-md text-on-surface-variant/60 mb-8">The credentials provided do not
                    match our secure records.</p>
                <div
                    class="inline-flex items-center gap-2 bg-red-500/10 border border-red-500/20 px-4 py-2 rounded-full mb-10">
                    <span class="material-symbols-outlined text-red-500 text-[18px]">warning</span>
                    <span class="font-label-caps text-label-caps text-red-500">NOT AUTHENTICATED</span>
                </div>
                <button
                    class="font-button text-button text-on-surface border border-outline-variant hover:bg-surface-container-highest px-8 py-3 rounded-lg transition-colors"
                    onclick="resetState()">
                    Try Again
                </button>
            </div>
            <!-- State 3: Success -->
            <div class="hidden-state state-transition flex flex-col items-center text-center py-4" id="successState">
                <div
                    class="w-[72px] h-[72px] rounded-full border-2 border-green-500/30 flex items-center justify-center mb-6">
                    <span class="material-symbols-outlined text-green-500 text-[40px]">check_circle</span>
                </div>
                <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome Back</h2>
                <p class="font-body-md text-body-md text-on-surface-variant/60 mb-10">Redirecting to dashboard...</p>
                <div class="w-full max-w-[200px] h-[4px] bg-surface-container-highest rounded-full overflow-hidden">
                    <div class="progress-bar-inner h-full bg-primary-container" id="progressBar"></div>
                </div>
            </div>
        </div>
    </main>
    <script>
        const authCard = document.getElementById('authCard');
        const loginForm = document.getElementById('loginForm');
        const loginState = document.getElementById('loginState');
        const failureState = document.getElementById('failureState');
        const successState = document.getElementById('successState');
        const successOverlay = document.getElementById('successOverlay');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const progressBar = document.getElementById('progressBar');

        const MOCK_CREDS = {
            username: 'admin',
            password: 'studio123'
        };

        function togglePassword() {
            const pwd = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eye.textContent = 'visibility_off';
            } else {
                pwd.type = 'password';
                eye.textContent = 'visibility';
            }
        }

        function switchState(targetState) {
            // Hide all states
            [loginState, failureState, successState].forEach(el => {
                el.classList.remove('active-state');
                el.classList.add('hidden-state');
            });

            // Show target
            targetState.classList.remove('hidden-state');
            targetState.classList.add('active-state');
        }

        function resetState() {
            switchState(loginState);
            loginForm.reset();
            authCard.classList.remove('shake');
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Loading state
            btnText.classList.add('hidden');
            btnIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            setTimeout(() => {
                loadingSpinner.classList.add('hidden');
                btnText.classList.remove('hidden');
                btnIcon.classList.remove('hidden');

                if (user === MOCK_CREDS.username && pass === MOCK_CREDS.password) {
                    // Success Path
                    switchState(successState);
                    successOverlay.style.opacity = '1';
                    setTimeout(() => {
                        progressBar.style.width = '100%';
                    }, 50);

                    // Simulate redirect
                    setTimeout(() => {
                        window.location.reload();
                    }, 2500);

                } else {
                    // Failure Path
                    switchState(failureState);
                    authCard.classList.add('shake');
                    setTimeout(() => authCard.classList.remove('shake'), 500);
                }
            }, 1200);
        });

        // Background visual effect micro-interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const glow = document.querySelector('.glow-background');
            glow.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, #F5A62315 0%, transparent 70%)`;
        });
    </script>
</body>

</html>
